options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Build the Docker image using your current project ID
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--no-cache',
      '--platform', 'linux/amd64',
      '-t', 'gcr.io/$PROJECT_ID/dj-nish-website:latest',
      '-f', 'Dockerfile',
      '.'
    ]

  # Step 2: Push the image to your project's container registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'gcr.io/$PROJECT_ID/dj-nish-website:latest'
    ]

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'dj-nish-website',
      '--image', 'gcr.io/$PROJECT_ID/dj-nish-website:latest',
      '--region', 'us-central1',
      '--allow-unauthenticated'
    ]

images:
  - 'gcr.io/$PROJECT_ID/dj-nish-website:latest'